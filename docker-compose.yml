services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: mydatabase
    ports:
      - '5432:5432'
    volumes:
      - ./dev/data/postgres:/var/lib/postgresql/data

  minio:
    container_name: minio
    image: minio/minio:RELEASE.2023-12-09T18-17-51Z
    restart: always
    ports:
      - 9000:9000
      - 9001:9001
    environment:
      - MINIO_ACCESS_KEY=${S3_ACCESS_KEY_ID}
      - MINIO_SECRET_KEY=${S3_SECRET_ACCESS_KEY}
    volumes:
      - ./dev/data/minio:/data
    command: server /data --address ':9000' --console-address ':9001'

  create-minio-bucket:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 ${S3_ACCESS_KEY_ID} ${S3_SECRET_ACCESS_KEY};
      /usr/bin/mc mb --ignore-existing myminio/${S3_BUCKET_NAME};
      exit 0;
      "
